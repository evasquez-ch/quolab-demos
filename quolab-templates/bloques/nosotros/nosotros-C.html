<!-- NOSOTROS C: Oscuro, imagen a la derecha, texto grande a la izquierda -->
<section class="nosotros nosotros-c">
  <div class="nos-c__layout">
    <div class="nos-c__text">
      <div class="container">
        <span class="section-label" style="color:rgba(255,255,255,0.4)">Nosotros</span>
        <h2 class="nos-c__title">{{nombre_negocio}}, referentes en {{rubro}} en {{ciudad}}</h2>
        <p class="nos-c__desc">{{descripcion}}</p>
        <div class="nos-c__stats">
          <div class="nos-c__stat"><strong>+10</strong><span>Anos de experiencia</span></div>
          <div class="nos-c__stat"><strong>100%</strong><span>Satisfaccion</span></div>
        </div>
        <div class="nos-c__tags">
          <span>{{servicio_1_titulo}}</span>
          <span>{{servicio_2_titulo}}</span>
          <span>{{servicio_3_titulo}}</span>
        </div>
      </div>
    </div>
    <div class="nos-c__img-wrap">
      <img src="{{img_nosotros_url}}" alt="{{img_nosotros_alt}}" class="nos-c__img" loading="lazy">
      <div class="nos-c__img-overlay"></div>
    </div>
  </div>
</section>
<style>
.nosotros-c { background: #080c14; overflow: hidden; }
.nos-c__layout { display: grid; grid-template-columns: 1fr 1fr; min-height: 560px; }
.nos-c__text {
  display: flex; align-items: center;
  padding: 5rem 0 5rem;
}
.nos-c__title {
  font-size: clamp(1.8rem,3vw,2.6rem); font-weight: 900; color: #fff;
  margin: 0.75rem 0 1.25rem; line-height: 1.15; letter-spacing: -0.02em;
  font-family: var(--font-display);
}
.nos-c__desc { font-size: 1rem; color: rgba(255,255,255,0.55); line-height: 1.8; margin: 0 0 2rem; }
.nos-c__stats { display: flex; gap: 2.5rem; margin-bottom: 2rem; }
.nos-c__stat strong { display: block; font-size: 2.2rem; font-weight: 900; color: var(--color-primario); font-family: var(--font-display); }
.nos-c__stat span { font-size: 0.78rem; color: rgba(255,255,255,0.4); }
.nos-c__tags { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.nos-c__tags span {
  background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem 1rem;
  border-radius: 999px; font-size: 0.82rem;
}
.nos-c__img-wrap { position: relative; overflow: hidden; }
.nos-c__img { width: 100%; height: 100%; object-fit: cover; display: block; }
.nos-c__img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(8,12,20,0.6) 0%, transparent 50%);
}
@media(max-width:768px) {
  .nos-c__layout { grid-template-columns: 1fr; }
  .nos-c__img-wrap { height: 280px; }
  .nos-c__img-overlay { background: linear-gradient(to bottom, rgba(8,12,20,0.3) 0%, rgba(8,12,20,0.7) 100%); }
}
</style>
