<!-- NOSOTROS VARIANTE A: Split texto + imagen real -->
<section class="nosotros nosotros-a">
  <div class="container">
    <div class="nos-a__layout">
      <div class="nos-a__text">
        <span class="section-label">Quienes somos</span>
        <h2 class="section-title">{{nombre_negocio}}</h2>
        <p>{{descripcion}}</p>
        <div class="nos-a__stats">
          <div class="nos-stat"><strong>+10</strong><span>Anos de experiencia</span></div>
          <div class="nos-stat"><strong>100%</strong><span>Clientes satisfechos</span></div>
          <div class="nos-stat"><strong>{{ciudad}}</strong><span>Siempre cerca de ti</span></div>
        </div>
        <a href="https://wa.me/{{telefono_limpio}}?text=Hola%2C%20quiero%20saber%20mas" class="btn btn--outline-dark" target="_blank" style="margin-top:2rem;display:inline-flex;">Contactar ahora</a>
      </div>
      <div class="nos-a__visual">
        <img src="{{img_nosotros_url}}" alt="{{img_nosotros_alt}}" class="nos-a__img" loading="lazy">
        <div class="nos-a__badge-float">
          <span>{{servicio_1_icono}}</span>
          <div>
            <strong>{{servicio_1_titulo}}</strong>
            <small>{{ciudad}}</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<style>
.nosotros-a { background: #fff; }
.nos-a__layout { display: grid; grid-template-columns: 1.1fr 1fr; gap: 5rem; align-items: center; }
.nos-a__text p { font-size: 1rem; color: #555; line-height: 1.75; margin: 1rem 0 2.5rem; }
.nos-a__stats { display: flex; gap: 2.5rem; flex-wrap: wrap; }
.nos-stat strong { display: block; font-size: 2rem; font-weight: 900; color: var(--color-primario); }
.nos-stat span { font-size: 0.8rem; color: #888; margin-top: 0.2rem; display: block; }
.nos-a__visual { position: relative; }
.nos-a__img {
  width: 100%; height: 480px; object-fit: cover;
  border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.nos-a__badge-float {
  position: absolute; bottom: -1.25rem; right: -1.25rem;
  background: #fff; border-radius: 12px; padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 0.85rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.nos-a__badge-float span { font-size: 1.75rem; }
.nos-a__badge-float strong { display: block; font-size: 0.88rem; color: #0a0a0a; }
.nos-a__badge-float small { font-size: 0.75rem; color: #888; }
@media (max-width: 768px) {
  .nos-a__layout { grid-template-columns: 1fr; gap: 2.5rem; }
  .nos-a__visual { display: none; }
}
</style>
