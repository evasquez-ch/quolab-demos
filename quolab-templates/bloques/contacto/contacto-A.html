<!-- CONTACTO VARIANTE A: Formulario + info lateral -->
<section id="contacto" class="contacto contacto-a">
  <div class="container">
    <div class="con-a__layout">
      <div class="con-a__info">
        <span class="section-label">Contacto</span>
        <h2 class="section-title">Estamos aquí para ayudarte</h2>
        <p>Cuéntanos qué necesitas y te respondemos a la brevedad.</p>
        <div class="con-a__items">
          <div class="con-item"><span>📍</span><div><strong>Dirección</strong><p>{{direccion}}</p></div></div>
          <div class="con-item"><span>📱</span><div><strong>WhatsApp</strong><p>{{telefono}}</p></div></div>
          <div class="con-item"><span>✉️</span><div><strong>Email</strong><p>{{email}}</p></div></div>
        </div>
      </div>
      <form class="con-a__form" onsubmit="handleForm(event)">
        <div class="form-group"><label>Nombre</label><input type="text" placeholder="Tu nombre" required></div>
        <div class="form-group"><label>Teléfono</label><input type="tel" placeholder="+56 9 ..."></div>
        <div class="form-group"><label>Mensaje</label><textarea rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea></div>
        <button type="submit" class="btn btn--primary" style="width:100%">Enviar mensaje</button>
        <p class="con-a__wa">O escríbenos directo por <a href="https://wa.me/{{telefono_limpio}}?text=Hola%2C%20quiero%20más%20información" target="_blank">WhatsApp →</a></p>
      </form>
    </div>
  </div>
</section>
<style>
.contacto-a{background:#fff;}
.con-a__layout{display:grid;grid-template-columns:1fr 1.1fr;gap:5rem;align-items:start;}
.con-a__info p{color:#666;margin:0.75rem 0 2rem;font-size:0.95rem;line-height:1.7;}
.con-a__items{display:flex;flex-direction:column;gap:1.5rem;}
.con-item{display:flex;gap:1rem;align-items:flex-start;}
.con-item span{font-size:1.4rem;margin-top:0.1rem;}
.con-item strong{display:block;font-size:0.85rem;font-weight:700;margin-bottom:0.2rem;}
.con-item p{font-size:0.88rem;color:#666;margin:0;}
.con-a__form{background:#f8faff;border-radius:16px;padding:2.25rem;border:1px solid #eef0f5;}
.form-group{margin-bottom:1.25rem;}
.form-group label{display:block;font-size:0.82rem;font-weight:700;margin-bottom:0.45rem;color:#333;}
.form-group input,.form-group textarea{width:100%;padding:0.8rem 1rem;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.92rem;font-family:inherit;transition:border-color 0.2s;background:#fff;}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--color-primario);}
.form-group textarea{resize:vertical;}
.con-a__wa{text-align:center;margin-top:1rem;font-size:0.82rem;color:#888;}
.con-a__wa a{color:var(--color-primario);font-weight:600;}
@media(max-width:768px){.con-a__layout{grid-template-columns:1fr;gap:2.5rem;}}
</style>
<script>
function handleForm(e){
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.textContent = '✅ Mensaje enviado';
  btn.disabled = true;
  setTimeout(()=>{btn.textContent='Enviar mensaje';btn.disabled=false;e.target.reset();},3000);
}
</script>
