<!-- CONTACTO B: Imagen de fondo, dos columnas info + formulario minimalista -->
<section id="contacto" class="contacto contacto-b" style="background-image:url('{{img_contacto_url}}');">
  <div class="con-b__overlay"></div>
  <div class="container con-b__inner">
    <div class="con-b__info">
      <span class="section-label" style="color:rgba(255,255,255,0.5)">Contacto</span>
      <h2 class="con-b__title">Hablemos hoy mismo</h2>
      <p class="con-b__sub">La forma mas rapida de empezar es por WhatsApp. Respondemos en minutos.</p>
      <a href="https://wa.me/{{telefono_limpio}}?text=Hola%2C%20vi%20su%20pagina%20y%20me%20interesa%20saber%20mas" class="con-b__wa" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Escribir a {{telefono}}
      </a>
      <div class="con-b__datos">
        <div class="con-b__dato"><span>&#128205;</span><p>{{direccion}}</p></div>
        <div class="con-b__dato"><span>&#9993;</span><p>{{email}}</p></div>
      </div>
    </div>
    <form class="con-b__form" onsubmit="handleFormB(event)">
      <h3 class="con-b__form-title">O dejanos tu mensaje</h3>
      <div class="con-b__field"><input type="text" placeholder="Tu nombre" required></div>
      <div class="con-b__field"><input type="tel" placeholder="Tu telefono"></div>
      <div class="con-b__field con-b__field--row">
        <select>
          <option value="" disabled selected>Que necesitas?</option>
          <option>{{servicio_1_titulo}}</option>
          <option>{{servicio_2_titulo}}</option>
          <option>{{servicio_3_titulo}}</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="con-b__field"><textarea rows="3" placeholder="Cuentanos mas..."></textarea></div>
      <button type="submit" class="con-b__submit">Enviar mensaje &rarr;</button>
    </form>
  </div>
</section>
<style>
.contacto-b {
  position: relative; padding: 6rem 1.5rem;
  background-size: cover; background-position: center; overflow: hidden;
}
.con-b__overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(5,8,20,0.93) 0%, color-mix(in srgb, var(--color-primario) 75%, black) 100%);
}
.con-b__inner {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start;
}
.con-b__title {
  font-size: clamp(1.8rem,3.5vw,2.6rem); font-weight: 900; color: #fff;
  margin: 0.75rem 0 1rem; font-family: var(--font-display);
}
.con-b__sub { color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 1.75rem; font-size: 0.95rem; }
.con-b__wa {
  display: inline-flex; align-items: center; gap: 0.75rem;
  background: #25D366; color: #fff; padding: 0.9rem 1.75rem;
  border-radius: 999px; font-weight: 700; font-size: 0.92rem;
  text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(37,211,102,0.35); margin-bottom: 2rem; display: flex; width: fit-content;
}
.con-b__wa:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,0.45); }
.con-b__datos { display: flex; flex-direction: column; gap: 0.85rem; }
.con-b__dato { display: flex; align-items: flex-start; gap: 0.75rem; }
.con-b__dato span { font-size: 1rem; margin-top: 0.05rem; }
.con-b__dato p { font-size: 0.85rem; color: rgba(255,255,255,0.45); margin: 0; line-height: 1.5; }
/* Formulario */
.con-b__form {
  background: rgba(255,255,255,0.06); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 2.25rem;
}
.con-b__form-title { color: #fff; font-size: 1.1rem; font-weight: 700; margin: 0 0 1.5rem; font-family: var(--font-display); }
.con-b__field { margin-bottom: 1rem; }
.con-b__field input,
.con-b__field textarea,
.con-b__field select {
  width: 100%; padding: 0.8rem 1rem;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #fff; font-size: 0.9rem; font-family: inherit;
  transition: border-color 0.2s, background 0.2s;
}
.con-b__field input::placeholder,
.con-b__field textarea::placeholder { color: rgba(255,255,255,0.35); }
.con-b__field select option { background: #13182a; color: #fff; }
.con-b__field input:focus,
.con-b__field textarea:focus,
.con-b__field select:focus {
  outline: none; border-color: var(--color-primario); background: rgba(255,255,255,0.12);
}
.con-b__field textarea { resize: vertical; }
.con-b__submit {
  width: 100%; padding: 0.9rem; border: none; border-radius: 8px;
  background: var(--color-acento); color: #fff; font-weight: 700; font-size: 0.95rem;
  cursor: pointer; transition: opacity 0.2s, transform 0.2s; font-family: inherit;
}
.con-b__submit:hover { opacity: 0.9; transform: translateY(-1px); }
@media(max-width:768px) { .con-b__inner { grid-template-columns: 1fr; gap: 2.5rem; } }
</style>
<script>
function handleFormB(e) {
  e.preventDefault();
  const btn = e.target.querySelector('.con-b__submit');
  btn.textContent = '&#10003; Mensaje enviado';
  btn.disabled = true;
  setTimeout(() => { btn.innerHTML = 'Enviar mensaje &rarr;'; btn.disabled = false; e.target.reset(); }, 3000);
}
</script>
