<!-- CTA A: Imagen de fondo, copy transversal, grande y llamativo -->
<section class="cta cta-a" style="background-image:url('{{img_cta_url}}');">
  <div class="cta-a__overlay"></div>
  <div class="container cta-a__inner">
    <div class="cta-a__left">
      <span class="cta-a__label">Hablemos hoy</span>
      <h2 class="cta-a__title">Tu negocio merece una presencia digital que genere resultados reales.</h2>
    </div>
    <div class="cta-a__right">
      <p>Estamos en {{ciudad}} y listos para ayudarte. Sin compromiso, sin letra chica.</p>
      <div class="cta-a__actions">
        <a href="https://wa.me/{{telefono_limpio}}?text=Hola%2C%20vi%20su%20pagina%20y%20quiero%20saber%20mas" class="cta-a__btn-main" target="_blank">
          Contactar por WhatsApp &rarr;
        </a>
        <span class="cta-a__tel">{{telefono}}</span>
      </div>
    </div>
  </div>
</section>
<style>
.cta-a {
  position: relative; padding: 6rem 1.5rem;
  background-size: cover; background-position: center; overflow: hidden;
}
.cta-a__overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(5,8,20,0.92) 0%, color-mix(in srgb, var(--color-primario) 80%, black) 100%);
}
.cta-a__inner {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 4rem; align-items: center;
}
.cta-a__label {
  display: inline-block; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--color-acento); margin-bottom: 1rem;
}
.cta-a__title {
  font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 900; color: #fff;
  line-height: 1.15; letter-spacing: -0.02em;
  font-family: var(--font-display);
}
.cta-a__right p { color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 2rem; font-size: 1rem; }
.cta-a__actions { display: flex; flex-direction: column; gap: 1rem; align-items: flex-start; }
.cta-a__btn-main {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: var(--color-acento); color: #fff;
  padding: 1rem 2.25rem; border-radius: 8px; font-weight: 700;
  font-size: 1rem; text-decoration: none;
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.cta-a__btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
.cta-a__tel { font-size: 0.88rem; color: rgba(255,255,255,0.4); letter-spacing: 0.05em; }
@media(max-width:768px) {
  .cta-a__inner { grid-template-columns: 1fr; gap: 2rem; }
}
</style>
