<!-- HERO C: Degradado oscuro izquierda → transparente derecha, imagen se luce a la derecha -->
<section class="hero hero-c" style="background-image:url('{{img_hero_url}}');">
  <div class="hero-c__overlay"></div>
  <div class="hero-c__inner container">
    <div class="hero-c__content">
      <div class="hero-c__meta">
        <span class="hero-c__num">{{rubro}}</span>
        <span class="hero-c__sep">&mdash;</span>
        <span class="hero-c__ciudad">{{ciudad}}</span>
      </div>
      <h1 class="hero-c__titulo">{{nombre_negocio}}</h1>
      <p class="hero-c__slogan">{{slogan}}</p>
      <a href="https://wa.me/{{telefono_limpio}}?text=Hola%2C%20vi%20su%20pagina%20y%20me%20interesa%20saber%20mas"
         class="hero-c__btn" target="_blank">
        Contactar ahora &rarr;
      </a>
    </div>
  </div>
  <div class="hero-c__strip">
    <div class="hero-c__strip-inner">
      <span>{{rubro}}</span><span class="hero-c__dot">&bull;</span>
      <span>{{ciudad}}</span><span class="hero-c__dot">&bull;</span>
      <span>{{nombre_negocio}}</span><span class="hero-c__dot">&bull;</span>
      <span>{{rubro}}</span><span class="hero-c__dot">&bull;</span>
      <span>{{ciudad}}</span><span class="hero-c__dot">&bull;</span>
      <span>{{nombre_negocio}}</span>
    </div>
  </div>
</section>
<style>

    rgba(6,9,18,0.88) 30%,

    rgba(6,9,18,0.0) 80%

}

}
.hero-c__content { max-width: 560px; }
.hero-c__meta {
  display: flex; align-items: center; gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.hero-c__num {

  letter-spacing: 0.14em; text-transform: uppercase;
}
.hero-c__sep { color: rgba(255,255,255,0.2); font-size: 0.8rem; }

}
.hero-c__titulo {

  color: #fff; line-height: 0.97; letter-spacing: -0.03em; margin: 0 0 1.5rem;
  font-family: var(--font-display);
}
.hero-c__slogan {

}
.hero-c__btn {

  font-size: 0.95rem; text-decoration: none;

  }
  .hero-c__content { max-width: 100%; }
}
</style>
