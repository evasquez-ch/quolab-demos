<!--
  Franja final Quolab — comun e identica en los 10 templates.
  Refuerza el branding de la agencia: fondo negro principal #0a0a0c,
  tipografia Neulis (Adobe Typekit), azul #2a3df4 en el link "Quolab".
  Variables que reemplaza el assembler:
    {{anio}}            -> ano actual
    {{nombre_negocio}}  -> nombre del negocio del prospecto
-->
<div class="ql-strip">
  <div class="ql-strip__inner">
    <span class="ql-strip__copy">
      &copy; {{anio}} <strong>{{nombre_negocio}}</strong> &mdash; Todos los derechos reservados.
    </span>
    <span class="ql-strip__brand">
      Desarrollado por
      <a href="https://quolab.cl" target="_blank" rel="noopener">Quolab</a>
    </span>
  </div>
</div>
